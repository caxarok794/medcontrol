<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация — МедКонтроль</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .auth-container { display: flex; justify-content: center; align-items: center; min-height: 80vh; }
        .auth-box { background: #fff; padding: 40px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); width: 100%; max-width: 400px; border: 1px solid #eaeaea; }
        .auth-box h2 { text-align: center; margin-bottom: 25px; color: #2c3e50; }
        .error-msg { color: #e74c3c; font-size: 14px; margin-bottom: 15px; display: none; }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo">
            <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="#4a76a8" stroke-width="2" style="margin-right: 10px;">
                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                <line x1="9" y1="3" x2="15" y2="21"></line>
                <line x1="3" y1="9" x2="21" y2="15"></line>
            </svg>
            МедКонтроль
        </a>
        <nav class="nav-links">
            <a href="catalog.html">Программы</a>
            <a href="register.html" class="btn-outline">Вход / Регистрация</a>
        </nav>
    </header>

    <div class="container auth-container">
        <div class="auth-box">
            <h2>Регистрация Пациента</h2>
            <div id="errorBox" class="error-msg"></div>
            
            <form id="regForm">
                <div class="form-group">
                    <label style="display:block; margin-bottom:5px; font-size:14px; color:#666;">ФИО</label>
                    <input type="text" id="fullname" class="form-control" placeholder="Иванов Иван Иванович" required>
                </div>
                <div class="form-group">
                    <label style="display:block; margin-bottom:5px; font-size:14px; color:#666;">Email</label>
                    <input type="text" id="email" class="form-control" placeholder="ivanov.ivan@email.ru" required>
                </div>
                <div class="form-group">
                    <label style="display:block; margin-bottom:5px; font-size:14px; color:#666;">Телефон</label>
                    <input type="tel" id="phone" class="form-control" placeholder="+7 (999) 123-45-67" required>
                </div>
                <div class="form-group">
                    <label style="display:block; margin-bottom:5px; font-size:14px; color:#666;">Пароль</label>
                    <input type="password" id="password" class="form-control" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-primary" style="width: 100%; margin-top: 10px;">Зарегистрироваться</button>
            </form>
        </div>
    </div>

    <script>
        document.getElementById('regForm').addEventListener('submit', function(e) {
            e.preventDefault(); // Останавливаем стандартную отправку
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorBox = document.getElementById('errorBox');
            
            if (!email.includes('@')) {
                errorBox.innerText = 'Ошибка: Указан некорректный формат электронной почты.';
                errorBox.style.display = 'block';
                return;
            }
            
            if (password.length < 6) {
                errorBox.innerText = 'Ошибка: Пароль должен содержать не менее 6 символов.';
                errorBox.style.display = 'block';
                return;
            }

            // Если всё ок, "авторизуем" и кидаем в кабинет
            localStorage.setItem('is_logged_in', 'true');
            window.location.href = 'dashboard.html';
        });
    </script>
</body>
</html>
