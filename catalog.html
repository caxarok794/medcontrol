<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Каталог программ — МедКонтроль</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* Стили сетки каталога */
        .catalog-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-top: 30px; }
        .program-card { background: #fff; padding: 25px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); border: 1px solid #eaeaea; display: flex; flex-direction: column; }
        .program-card h3 { color: #4a76a8; margin-bottom: 10px; font-size: 22px; }
        .program-card .price { font-size: 20px; font-weight: bold; margin-bottom: 15px; }
        .program-card p { color: #555; margin-bottom: 20px; flex-grow: 1; }
        .btn-add { width: 100%; text-align: center; }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo">
            <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="#4a76a8" stroke-width="2" style="margin-right: 10px;">
                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                <line x1="9" y1="3" x2="15" y2="21"></line>
                <line x1="3" y1="9" x2="21" y2="15"></line>
            </svg>
            МедКонтроль
        </a>
        <nav class="nav-links">
            <a href="catalog.html" style="font-weight: bold; color: #4a76a8;">Программы</a>
            <a href="#">Специалисты</a>
            <a href="cart.html">Выбранное <span id="cart-count" style="background:#4a76a8; color:white; border-radius:50%; padding:2px 6px; font-size:12px;">0</span></a>
            <a href="dashboard.html" class="btn-outline">Личный кабинет</a>
        </nav>
    </header>

    <div class="container" style="text-align: center;">
        <h1 style="margin-bottom: 10px; color: #2c3e50;">Доступные программы обследований</h1>
        <p style="color: #666;">Выберите подходящий чекап и добавьте его к записи.</p>
        
        <div id="catalog-container" class="catalog-grid">
            <p>Загрузка программ...</p>
        </div>
    </div>

    <script>
        // Загрузка данных из JSON (AJAX / Fetch API)
        document.addEventListener('DOMContentLoaded', () => {
            fetch('api/programs.json')
                .then(response => response.json())
                .then(data => renderCatalog(data))
                .catch(error => {
                    document.getElementById('catalog-container').innerHTML = '<p>Ошибка загрузки данных. Убедитесь, что используете локальный сервер.</p>';
                    console.error('Ошибка:', error);
                });
            
            updateCartCount();
        });

        // Отрисовка карточек
        function renderCatalog(programs) {
            const container = document.getElementById('catalog-container');
            container.innerHTML = ''; // Очищаем "Загрузку"

            programs.forEach(prog => {
                const card = document.createElement('div');
                card.className = 'program-card';
                card.innerHTML = `
                    <h3>${prog.title}</h3>
                    <div class="price">${prog.price} руб.</div>
                    <p>${prog.description}</p>
                    <button class="btn-primary btn-add" onclick="addToCart(${prog.id}, '${prog.title}', ${prog.price})">Добавить к записи</button>
                `;
                container.appendChild(card);
            });
        }

        // Логика корзины (localStorage)
        function addToCart(id, title, price) {
            let cart = JSON.parse(localStorage.getItem('med_cart')) || [];
            // Проверяем, нет ли уже этой программы в корзине
            if (!cart.find(item => item.id === id)) {
                cart.push({ id, title, price });
                localStorage.setItem('med_cart', JSON.stringify(cart));
                alert(`Программа "${title}" добавлена!`);
                updateCartCount();
            } else {
                alert('Эта программа уже добавлена!');
            }
        }

        function updateCartCount() {
            let cart = JSON.parse(localStorage.getItem('med_cart')) || [];
            document.getElementById('cart-count').innerText = cart.length;
        }
    </script>
</body>
</html>
