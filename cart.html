<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Выбранные программы — МедКонтроль</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .cart-item { background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); border: 1px solid #eaeaea; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
        .cart-item-title { font-size: 20px; color: #4a76a8; font-weight: bold; }
        .cart-item-price { font-size: 18px; font-weight: bold; }
        .btn-remove { background: #e74c3c; color: white; border: none; padding: 8px 12px; border-radius: 4px; cursor: pointer; }
        .total-box { text-align: right; margin-top: 20px; font-size: 22px; font-weight: bold; }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo">
            <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="#4a76a8" stroke-width="2" style="margin-right: 10px;">
                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                <line x1="9" y1="3" x2="15" y2="21"></line>
                <line x1="3" y1="9" x2="21" y2="15"></line>
            </svg>
            МедКонтроль
        </a>
        <nav class="nav-links">
            <a href="catalog.html">Программы</a>
            <a href="#">Специалисты</a>
            <a href="cart.html" style="font-weight: bold; color: #4a76a8;">Выбранное</a>
            <a href="dashboard.html" class="btn-outline">Личный кабинет</a>
        </nav>
    </header>

    <div class="container" style="max-width: 700px;">
        <h1 style="text-align: center; margin-bottom: 30px;">Выбранные программы</h1>
        
        <div id="cart-container">
            </div>

        <div class="total-box" id="total-box" style="display: none;">
            Итого: <span id="total-price">0</span> руб.
            <div style="margin-top: 20px;">
                <button class="btn-primary" style="width: 100%;" onclick="confirmOrder()">Подтвердить запись</button>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', renderCart);

        function renderCart() {
            let cart = JSON.parse(localStorage.getItem('med_cart')) || [];
            const container = document.getElementById('cart-container');
            const totalBox = document.getElementById('total-box');
            
            container.innerHTML = '';
            let total = 0;

            if (cart.length === 0) {
                container.innerHTML = '<p style="text-align:center;">Вы еще не выбрали ни одной программы.</p>';
                totalBox.style.display = 'none';
                return;
            }

            cart.forEach(item => {
                total += item.price;
                const div = document.createElement('div');
                div.className = 'cart-item';
                div.innerHTML = `
                    <div class="cart-item-title">${item.title}</div>
                    <div style="display:flex; align-items:center; gap:20px;">
                        <div class="cart-item-price">${item.price} руб.</div>
                        <button class="btn-remove" onclick="removeFromCart(${item.id})">Удалить</button>
                    </div>
                `;
                container.appendChild(div);
            });

            document.getElementById('total-price').innerText = total;
            totalBox.style.display = 'block';
        }

        function removeFromCart(id) {
            let cart = JSON.parse(localStorage.getItem('med_cart')) || [];
            cart = cart.filter(item => item.id !== id);
            localStorage.setItem('med_cart', JSON.stringify(cart));
            renderCart();
        }

        function confirmOrder() {
            alert('Запись успешно подтверждена! Ждем вас в клинике.');
            localStorage.removeItem('med_cart'); // Очищаем корзину после заказа
            window.location.href = 'dashboard.html'; // Перекидываем в личный кабинет
        }
    </script>
</body>
</html>
